<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel — Documentation</title>
  <meta name="description" content="Sentinel documentation — Command Center, Camera Node, and Home Assistant.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <style>
    :root {
      --bg: #08090d;
      --text: #e4e4e7;
      --text-2: #a1a1aa;
      --green: #22c55e;
      --border: #1a1b25;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); }
    /* Back to site bar */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 24px;
      background: rgba(10,10,15,0.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .topbar a { color: var(--text); text-decoration: none; font-size: 14px; font-weight: 500; }
    .topbar .brand { display: flex; align-items: center; gap: 6px; font-weight: 600; }
    .topbar .brand .s { color: var(--green); font-weight: 700; }
    .topbar .back { color: var(--text-2); font-size: 13px; display: flex; align-items: center; gap: 4px; transition: color .15s; }
    .topbar .back:hover { color: var(--green); }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --base-font-size: 16px;
      --theme-color: #22c55e;
      --link-color: #22c55e;
      --link-color--hover: #2ad66c;
      --heading-color: #e4e4e7;
      --code-background: #0f1018;
      --code-inline-background: #15171f;
      --code-theme-background: #0f1018;
      --blockquote-color: #a1a1aa;
      --blockquote-border-color: #22c55e;
      --sidebar-background: #0a0b10;
      --sidebar-border-color: #1a1b25;
      --sidebar-nav-link-color: #a1a1aa;
      --sidebar-nav-link-color--active: #22c55e;
      --sidebar-nav-link-color--hover: #e4e4e7;
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-name-color: #e4e4e7;
      --sidebar-name-font-size: 16px;
      --content-max-width: 85em;
    }
    body { font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif; }
    .topbar { z-index: 1000; }
    .sidebar { padding-top: 48px; border-right: 1px solid var(--border); }
    .content { padding-top: 48px; }
    pre { background: #0f1018 !important; border: 1px solid var(--border); border-radius: 8px; }
    code { background: #15171f !important; border-radius: 4px; padding: 2px 6px; font-size: 0.9em; font-family: 'JetBrains Mono', monospace; }
    pre code { background: transparent !important; padding: 0; }
    a { color: var(--green); text-decoration: none; }
    a:hover { color: var(--link-color--hover); }
    h1, h2, h3, h4 { letter-spacing: -0.5px; }
    .sidebar-nav a { font-size: 14px; }
    .sidebar-name { font-weight: 700; }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="brand" href="../"><span class="s">Sentinel</span> Docs</a>
    <a class="back" href="../">← Back to site</a>
  </div>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Sentinel',
      loadSidebar: true,
      auto2top: true,
      maxLevel: 4,
      subMaxLevel: 3,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results found.',
        depth: 3,
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied',
      },
      darkMode: true,
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-docker.min.js"></script>
</body>
</html>
