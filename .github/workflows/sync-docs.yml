name: Sync Docs

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'sync_docs.py'
      - '.github/workflows/sync-docs.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-docs
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages/stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update && sudo apt install gh -y

      - name: Auth GitHub CLI
        run: gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Run sync script
        run: python3 sync_docs.py

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create sync branch and pull request
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="docs/auto-sync-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          git commit -m "docs: auto-sync from Sentinel repos [$(date -u +%Y-%m-%dT%H:%M)]"
          git push --set-upstream origin "$BRANCH"
          # Auto-merge: master is protected (requires PR + review). Use a PR
          # and merge it immediately so scheduled sync keeps working unattended.
          PR_URL=$(gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "docs: auto-sync from Sentinel repos" \
            --body "Automated documentation sync generated by the **Sync Docs** workflow (run $GITHUB_RUN_ID). This PR is opened and auto-merged because \`master\` is protected and direct pushes are rejected." \
            --label documentation)
          echo "Opened $PR_URL"
          # Allow required status checks to initialize, then auto-merge.
          sleep 5
          gh pr merge "$BRANCH" --merge --admin --delete-branch || \
            gh pr merge "$PR_URL" --merge --admin --delete-branch