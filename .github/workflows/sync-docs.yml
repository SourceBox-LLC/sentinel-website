name: Sync Docs

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'sync_docs.py'
      - '.github/workflows/sync-docs.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-docs
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update && sudo apt install gh -y

      - name: Auth GitHub CLI
        run: gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Run sync script
        run: python3 sync_docs.py

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push to sync branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: auto-sync from Sentinel repos [$(date -u +%Y-%m-%dT%H:%M)]"
          # master is protected (no direct push). Push to a dedicated sync
          # branch and merge via PR (review requirement is 0, so the bot can
          # self-merge) instead of pushing directly to master.
          SYNC_BRANCH="docs/auto-sync"
          git push --force origin "HEAD:${SYNC_BRANCH}"

      - name: Open, update, and merge sync PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_BRANCH="docs/auto-sync"
          PR_TITLE="docs: auto-sync from Sentinel repos"
          PR_BODY="Automated documentation sync from Sentinel repos. Opened and auto-merged by the \`Sync Docs\` workflow (master is protected, so changes land via PR rather than direct push)."
          # Find an existing open PR for the sync branch, if any.
          EXISTING=$(gh pr list --head "${SYNC_BRANCH}" --base master --state open --json number --jq '.[0].number' || true)
          if [ -n "${EXISTING}" ]; then
            gh pr edit "${EXISTING}" --title "${PR_TITLE}" --body "${PR_BODY}"
            PR_NUMBER="${EXISTING}"
            echo "Updated existing PR #${PR_NUMBER}"
          else
            PR_URL=$(gh pr create --head "${SYNC_BRANCH}" --base master \
              --title "${PR_TITLE}" --body "${PR_BODY}" \
              --label "documentation" --label "automated")
            PR_NUMBER=$(echo "${PR_URL}" | grep -oE '[0-9]+$')
            echo "Opened new PR #${PR_NUMBER}"
          fi
          # Master's review requirement is 0, so the GITHUB_TOKEN can merge the
          # PR directly (squash to satisfy required-linear-history). This keeps
          # the hourly cron fully automatic.
          gh pr merge "${PR_NUMBER}" --squash --delete-branch --subject "${PR_TITLE}"