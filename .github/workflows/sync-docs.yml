name: Sync Docs

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'sync_docs.py'
      - '.github/workflows/sync-docs.yml'

permissions:
  contents: write

concurrency:
  group: sync-docs
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update && sudo apt install gh -y

      - name: Auth GitHub CLI
        run: gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Run sync script
        run: python3 sync_docs.py

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and open PR
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: auto-sync from Sentinel repos [$(date -u +%Y-%m-%dT%H:%M)]"

          # master is protected (requires PRs), so push to a sync branch
          # and open a pull request instead of pushing directly to master.
          BRANCH="docs/sync-$(date -u +%Y%m%d-%H%M)"
          git push origin "HEAD:$BRANCH"

          STAMP="$(date -u +%Y-%m-%dT%H:%M)"
          printf 'Auto-generated by the `Sync Docs` workflow.\n\nThe docs mirror from Sentinel-Command, Sentinel-CameraNode, and Sentinel-HomeAssistant has changed. Pushing directly to `master` is blocked by branch protection, so this PR carries the synced docs (timestamp %s).\n' "$STAMP" > /tmp/pr-body.md

          gh pr create \
            --title "docs: auto-sync from Sentinel repos [$STAMP]" \
            --body-file /tmp/pr-body.md \
            --base master \
            --head "$BRANCH"