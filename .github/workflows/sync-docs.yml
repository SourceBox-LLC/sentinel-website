name: Sync Docs

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'sync_docs.py'
      - '.github/workflows/sync-docs.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-docs
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update && sudo apt install gh -y

      - name: Auth GitHub CLI
        run: gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Run sync script
        run: python3 sync_docs.py

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or update sync PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SYNC_BRANCH="sync-docs/auto"
          git checkout -B "$SYNC_BRANCH"
          git commit -m "docs: auto-sync from Sentinel repos [$(date -u +%Y-%m-%dT%H:%M)]"
          # master is protected (requires PRs), so push to a dedicated sync
          # branch and open a PR from there instead of pushing to master.
          git push --force origin "$SYNC_BRANCH"
          # If a PR already exists for this branch, gh pr create exits non-zero;
          # that's fine — the force-push above already updated the existing PR.
          gh pr create \
            --title "docs: auto-sync from Sentinel repos" \
            --body "Automated hourly sync of documentation from Sentinel-Command, Sentinel-CameraNode, and Sentinel-HomeAssistant." \
            --base master \
            --head "$SYNC_BRANCH" \
            2>/dev/null || echo "PR already exists — sync branch force-updated"