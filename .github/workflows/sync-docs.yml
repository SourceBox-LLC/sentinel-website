name: Sync Docs

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'sync_docs.py'
      - '.github/workflows/sync-docs.yml'

permissions:
  contents: write

concurrency:
  group: sync-docs
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update && sudo apt install gh -y

      - name: Auth GitHub CLI
        run: gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Run sync script
        run: python3 sync_docs.py

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push to sync branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: auto-sync from Sentinel repos [$(date -u +%Y-%m-%dT%H:%M)]"
          # master is protected (requires PR + review), so push to a dedicated
          # sync branch and open/update a PR instead of pushing to master directly.
          SYNC_BRANCH="docs/auto-sync"
          git checkout -B "$SYNC_BRANCH"
          git push --force origin "$SYNC_BRANCH"

      - name: Open or update sync PR
        if: steps.changes.outputs.changed == 'true'
        run: |
          SYNC_BRANCH="docs/auto-sync"
          PR_BODY="Automated documentation sync from Sentinel repos. Updated $(date -u +%Y-%m-%dT%H:%M)."
          # Create the PR if it doesn't exist; otherwise refresh its body.
          if ! gh pr view "$SYNC_BRANCH" --json number >/dev/null 2>&1; then
            gh pr create --base master --head "$SYNC_BRANCH" \
              --title "docs: auto-sync from Sentinel repos" \
              --body "$PR_BODY" \
              --label documentation
          else
            gh pr edit "$SYNC_BRANCH" --body "$PR_BODY"
          fi