name: Sync Docs

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'sync_docs.py'
      - '.github/workflows/sync-docs.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-docs
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update && sudo apt install gh -y

      - name: Auth GitHub CLI
        run: gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Run sync script
        run: python3 sync_docs.py

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push to sync branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: auto-sync from Sentinel repos [$(date -u +%Y-%m-%dT%H:%M)]"
          # master is protected (requires PR + review). Push to a dedicated sync
          # branch and open/update a PR instead of pushing directly to master.
          SYNC_BRANCH="docs/auto-sync"
          git push --force origin "HEAD:${SYNC_BRANCH}"

      - name: Open or update sync PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_BRANCH="docs/auto-sync"
          PR_TITLE="docs: auto-sync from Sentinel repos"
          PR_BODY="Automated documentation sync from Sentinel repos. Opened by the \`Sync Docs\` workflow because \`master\` is protected and cannot receive direct pushes."
          # Try to find an existing open PR for the sync branch.
          EXISTING=$(gh pr list --head "${SYNC_BRANCH}" --base master --state open --json number --jq '.[0].number' || true)
          if [ -n "${EXISTING}" ]; then
            gh pr edit "${EXISTING}" --title "${PR_TITLE}" --body "${PR_BODY}"
            echo "Updated existing PR #${EXISTING}"
          else
            # Create the 'automated' label if it doesn't exist so PR creation
            # does not fail. The label is optional; fall back gracefully.
            gh label create automated --description "Automated PR opened by a GitHub Actions workflow" --color 0E8A16 2>/dev/null || true
            gh pr create --head "${SYNC_BRANCH}" --base master \
              --title "${PR_TITLE}" --body "${PR_BODY}" \
              --label "documentation" --label "automated"
          fi